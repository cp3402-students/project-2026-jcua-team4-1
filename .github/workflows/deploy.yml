name: Deploy WordPress Theme to Lightsail (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Package ONLY the theme files (your repo root IS the theme)
      - name: Package theme
        run: |
          mkdir kc-blast-theme
          shopt -s extglob
          cp -r !(kc-blast-theme) kc-blast-theme
          tar -czf theme.tar.gz kc-blast-theme

      - name: Upload theme to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "theme.tar.gz"
          target: "/home/deploy/"

      - name: Deploy theme on Lightsail
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/deploy
            tar -xzf theme.tar.gz

            # Sync theme into Bitnami WordPress directory
            sudo rsync -avz kc-blast-theme/ \
              /opt/bitnami/wordpress/wp-content/themes/kc-blast-theme/

            # Fix permissions for Bitnami
            sudo chown -R bitnami:daemon /opt/bitnami/wordpress/wp-content/themes/kc-blast-theme
            sudo chmod -R 775 /opt/bitnami/wordpress/wp-content/themes/kc-blast-theme

            # Cleanup
            rm -rf kc-blast-theme theme.tar.gz
