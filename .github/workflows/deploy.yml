name: Deploy WordPress Theme to Lightsail (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Theme (root → theme folder)
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude=".github" \
            ./ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/bitnami/wordpress/wp-content/themes/your-theme/

      - name: Fix Permissions
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            sudo chown -R bitnami:daemon /opt/bitnami/wordpress/wp-content/themes/your-theme
            sudo find /opt/bitnami/wordpress/wp-content/themes/your-theme -type d -exec chmod 775 {} \;
            sudo find /opt/bitnami/wordpress/wp-content/themes/your-theme -type f -exec chmod 664 {} \;
          EOF
