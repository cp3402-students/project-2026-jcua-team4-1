name: Deploy WordPress to Lightsail

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build theme
        run: |
          npm install
          npm run build

      - name: Package theme
        run: tar -czf kc-blast-theme.tar.gz --exclude=node_modules --exclude=.git .

      - name: Upload to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "kc-blast-theme.tar.gz"
          target: "/home/deploy/"

      - name: Deploy on staging
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /home/deploy
            tar -xzf kc-blast-theme.tar.gz
            sudo rsync -avz wp-content/themes/kc-blast-theme /opt/bitnami/wordpress/wp-content/themes/
            rm kc-blast-theme.tar.gz

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build theme
        run: |
          npm install
          npm run build

      - name: Package theme
        run: tar -czf kc-blast-theme.tar.gz --exclude=node_modules --exclude=.git .

      - name: Upload to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "theme.tar.gz"
          target: "/home/deploy/"

      - name: Deploy on production
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/deploy
            tar -xzf theme.tar.gz
            sudo rsync -avz wp-content/themes/kc-blast-theme /opt/bitnami/wordpress/wp-content/themes/
            rm theme.tar.gz
